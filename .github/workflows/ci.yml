# SolidAI SRE — CI Pipeline
# Runs on push and pull request to main.
# Tests sre-agent nodes, health-monitor, and config-service.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Lint sre-agent
        run: ruff check sre-agent/

      - name: Lint health-monitor
        run: ruff check health-monitor/ || echo "health-monitor: no issues or skipped"

      - name: Lint config-service
        run: ruff check config_service/ || echo "config_service: no issues or skipped"

  sre-agent-tests:
    name: sre-agent Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential

      - name: Install sre-agent dependencies
        run: |
          cd sre-agent
          pip install -e ".[test]" 2>&1 | tail -5

      - name: Run node-level unit tests
        run: |
          cd sre-agent
          python -m pytest \
            tests/test_planner.py \
            tests/test_synthesizer.py \
            tests/test_writeup.py \
            tests/test_state.py \
            tests/test_init_context.py \
            tests/test_memory_store.py \
            tests/test_memory_lookup.py \
            tests/test_subagent_executor.py \
            tests/test_kg_context.py \
            tests/test_skill_tools.py \
            tests/test_feedback_loop.py \
            tests/test_parallel_fanout.py \
            tests/test_sse_mapping.py \
            tests/test_debug_stream.py \
            tests/test_graph_e2e.py \
            -v --tb=short 2>&1

      - name: Run litellm config structure tests
        run: |
          cd sre-agent
          python -m pytest \
            tests/test_litellm_fallback_chain.py \
            -v --tb=short \
            -k "not TestLitellmProxyHealth" 2>&1
