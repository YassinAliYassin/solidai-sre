# LiteLLM Proxy Configuration
#
# Model routing: explicit model entries with fallback chain.
# The sre-agent sends model names like "claude-sonnet-4-20250514".
# These are defined as explicit model entries that map to openrouter/owl-alpha.
# When a model fails, router_settings.fallbacks routes through the chain.
#
# Fallback chain (fastest → most capable):
#   llm-primary → llm-fallback1 → llm-fallback2 → llm-fallback3 → llm-fallback4
#   (owl-alpha)    (gpt-oss-20b)   (cohere)       (gpt-oss-120b)  (nemotron-ultra)
#
# NOTE: OpenRouter can take 15-20s from VPS — request_timeout is 300s.
# Fallback models are ordered by expected latency (fastest first).
# All fallback models are free-tier — no credit dependency.

model_list:
  # Primary: owl-alpha (free, 1M context) — fastest high-quality model
  - model_name: "llm-primary"
    litellm_params:
      model: openrouter/owl-alpha
      api_key: os.environ/OPENROUTER_API_KEY

  # Alias: claude-sonnet-4 → llm-primary (sre-agent default)
  - model_name: "claude-sonnet-4-20250514"
    litellm_params:
      model: openrouter/owl-alpha
      api_key: os.environ/OPENROUTER_API_KEY

  # Alias: claude-haiku-4-5 → llm-primary (summary/memory/writeup)
  - model_name: "claude-haiku-4-5-20251001"
    litellm_params:
      model: openrouter/owl-alpha
      api_key: os.environ/OPENROUTER_API_KEY

  # Alias: openrouter/free → llm-primary
  - model_name: "openrouter/free"
    litellm_params:
      model: openrouter/owl-alpha
      api_key: os.environ/OPENROUTER_API_KEY

  # Alias: tencent/hy3-preview → llm-primary
  - model_name: "openrouter/tencent/hy3-preview"
    litellm_params:
      model: openrouter/owl-alpha
      api_key: os.environ/OPENROUTER_API_KEY

  # Fallback 1: GPT-OSS 20B (free, 131K context) — fast, good agentic
  - model_name: "llm-fallback1"
    litellm_params:
      model: openrouter/openai/gpt-oss-20b:free
      api_key: os.environ/OPENROUTER_API_KEY

  # Fallback 2: Cohere North Mini Code (free, 256K context) — fast, reliable
  - model_name: "llm-fallback2"
    litellm_params:
      model: openrouter/cohere/north-mini-code:free
      api_key: os.environ/OPENROUTER_API_KEY

  # Fallback 3: GPT-OSS 120B (free, 131K context) — large open-weight MoE
  - model_name: "llm-fallback3"
    litellm_params:
      model: openrouter/openai/gpt-oss-120b:free
      api_key: os.environ/OPENROUTER_API_KEY

  # Fallback 4: NVIDIA Nemotron 3 Ultra 550B (free, 1M context) — largest free model
  - model_name: "llm-fallback4"
    litellm_params:
      model: openrouter/nvidia/nemotron-3-ultra-550b-a55b:free
      api_key: os.environ/OPENROUTER_API_KEY

  # Last resort: NVIDIA Nemotron 3 Super 120B (free, 1M context)
  # Replaces openrouter/auto which requires credits
  - model_name: "llm-last-resort"
    litellm_params:
      model: openrouter/nvidia/nemotron-3-super-120b-a12b:free
      api_key: os.environ/OPENROUTER_API_KEY

litellm_settings:
  drop_params: true
  num_retries: 2
  request_timeout: 300

# Define the fallback chain between model groups.
# Each model falls through to the next on failure.
# Alias models fall back to the same chain as llm-primary.
router_settings:
  fallbacks:
    - llm-primary: ["llm-fallback1"]
    - claude-sonnet-4-20250514: ["llm-fallback1"]
    - claude-haiku-4-5-20251001: ["llm-fallback1"]
    - openrouter/free: ["llm-fallback1"]
    - openrouter/tencent/hy3-preview: ["llm-fallback1"]
    - llm-fallback1: ["llm-fallback2"]
    - llm-fallback2: ["llm-fallback3"]
    - llm-fallback3: ["llm-fallback4"]
    - llm-fallback4: ["llm-last-resort"]
